<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSAT Evaluation Dashboard — Mindanao BU-2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0e1a2b;
  --bg-mid: #132238;
  --bg-card: rgba(255,255,255,0.06);
  --bg-card-hover: rgba(255,255,255,0.1);
  --border: rgba(255,255,255,0.08);
  --border-glow: rgba(56,189,176,0.25);
  --text-primary: #e8f0f8;
  --text-secondary: #8a9bb5;
  --text-muted: #5a6d85;
  --teal: #38bdb0;
  --teal-glow: rgba(56,189,176,0.15);
  --coral: #f0736e;
  --amber: #f5b946;
  --violet: #9b7cf6;
  --blue: #5b9cf6;
  --emerald: #34d399;
  --rose: #f472b6;
  --font-display: 'Outfit', sans-serif;
  --font-body: 'Plus Jakarta Sans', sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.25);
  --shadow-glow: 0 0 30px rgba(56,189,176,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(56,189,176,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(240,115,110,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(155,124,246,0.04) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.wrapper { position: relative; z-index: 1; max-width: 1260px; margin: 0 auto; padding: 0 28px 40px; }

/* ── Header ── */
.header {
  padding: 26px 0 20px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, var(--teal), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 900; font-size: 22px; color: #fff;
  box-shadow: 0 4px 16px rgba(56,189,176,0.3);
}
.header h1 {
  font-family: var(--font-display); font-size: 24px; font-weight: 800;
  letter-spacing: -0.03em; color: #fff;
}
.header .subtitle {
  font-size: 12px; color: var(--text-muted); font-weight: 600;
  letter-spacing: 0.06em; margin-top: 2px;
}

/* ── Tab Navigation ── */
.tab-nav {
  display: flex; gap: 4px; background: var(--bg-mid); border-radius: 12px; padding: 4px;
  border: 1px solid var(--border);
}
.tab-btn {
  padding: 9px 20px; border-radius: 9px; border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 12px; font-weight: 700;
  background: transparent; color: var(--text-muted); transition: all 0.3s;
}
.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active {
  background: linear-gradient(135deg, var(--teal), #2da89d);
  color: #fff; box-shadow: 0 2px 12px rgba(56,189,176,0.3);
}

/* ── Cards ── */
.card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; backdrop-filter: blur(12px);
  box-shadow: var(--shadow); transition: all 0.3s;
}
.card:hover { border-color: var(--border-glow); box-shadow: var(--shadow), var(--shadow-glow); }
.section-title {
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 16px;
}

/* ── Grid Layouts ── */
.grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 22px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; }
.grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 22px; }
.mb-22 { margin-bottom: 22px; }

/* ── KPI Cards ── */
.kpi { position: relative; overflow: hidden; }
.kpi::after {
  content: ''; position: absolute; top: -30px; right: -30px;
  width: 90px; height: 90px; border-radius: 50%;
  background: var(--accent-color, var(--teal)); opacity: 0.06;
}
.kpi-icon { font-size: 18px; margin-bottom: 4px; }
.kpi-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.kpi-value { font-family: var(--font-display); font-size: 30px; font-weight: 800; margin: 4px 0 6px; letter-spacing: -0.02em; }
.kpi-change { font-size: 11px; font-weight: 700; }
.kpi-change.up { color: var(--emerald); }
.kpi-change.down { color: var(--coral); }
.kpi-sub { font-size: 10px; color: var(--text-muted); margin-left: 4px; }

/* ── Employee Selector ── */
.emp-selector { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
.emp-btn {
  padding: 9px 22px; border-radius: 10px; cursor: pointer;
  font-family: var(--font-body); font-size: 13px; font-weight: 700;
  background: var(--bg-card); border: 1.5px solid var(--border); color: var(--text-muted);
  transition: all 0.25s;
}
.emp-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
.emp-btn.active { border-width: 2px; }

/* ── Score Badge ── */
.score-badge {
  display: inline-block; padding: 4px 12px; border-radius: 8px;
  font-weight: 800; font-size: 12px;
}
.rating-pill {
  font-size: 9px; padding: 3px 9px; border-radius: 6px; font-weight: 700;
}

/* ── Tables ── */
table { width: 100%; border-collapse: separate; border-spacing: 0 5px; font-size: 12px; }
thead th {
  text-align: center; padding: 8px 10px; color: var(--text-muted);
  font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
}
thead th:first-child { text-align: left; padding-left: 14px; }
tbody tr { background: rgba(255,255,255,0.03); transition: background 0.2s; }
tbody tr:hover { background: rgba(255,255,255,0.06); }
tbody td { padding: 10px 8px; text-align: center; }
tbody td:first-child { text-align: left; padding-left: 14px; font-weight: 700; border-radius: 8px 0 0 8px; }
tbody td:last-child { border-radius: 0 8px 8px 0; }
.row-total { background: linear-gradient(90deg, rgba(56,189,176,0.08), rgba(245,185,70,0.06)) !important; }
.row-total td:first-child { font-weight: 800; color: #fff; }

/* ── Period Cards ── */
.period-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px; text-align: center; position: relative; overflow: hidden;
  backdrop-filter: blur(12px); transition: all 0.3s;
}
.period-card:hover { border-color: var(--border-glow); transform: translateY(-2px); }
.period-card .period-name {
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  color: var(--text-secondary); margin-bottom: 10px;
}
.period-card .period-avg {
  font-family: var(--font-display); font-size: 36px; font-weight: 900;
  letter-spacing: -0.03em; margin-bottom: 6px;
}
.period-card .period-breakdown {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px;
}
.period-card .period-cat {
  font-size: 10px; font-weight: 600; color: var(--text-muted);
  display: flex; justify-content: space-between; padding: 3px 6px;
  background: rgba(255,255,255,0.03); border-radius: 4px;
}
.period-card .period-cat span { font-weight: 800; }

/* ── Tab Content ── */
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Footer ── */
.footer {
  text-align: center; padding: 20px 0; margin-top: 30px;
  border-top: 1px solid var(--border);
  font-size: 10px; color: var(--text-muted); font-weight: 600;
}

/* ── Legend ── */
.legend-bar { display: flex; justify-content: center; gap: 18px; margin-top: 18px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-swatch { width: 14px; height: 14px; border-radius: 4px; }
.legend-label { font-size: 10px; color: var(--text-muted); font-weight: 600; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .grid-2 { grid-template-columns: 1fr; }
  .grid-5 { grid-template-columns: repeat(2, 1fr); }
  .header { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="wrapper">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logo">K</div>
      <div>
        <h1>KSAT Evaluation Dashboard</h1>
        <div class="subtitle">MINDANAO BU-2 &nbsp;·&nbsp; Knowledge · Skills · Attitude · Team</div>
      </div>
    </div>
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('group')">👥 Group</button>
      <button class="tab-btn" onclick="switchTab('individual')">👤 Individual</button>
      <button class="tab-btn" onclick="switchTab('period')">📊 Period Summary</button>
    </div>
  </div>

  <!-- ═══════════ GROUP TAB ═══════════ -->
  <div id="tab-group" class="tab-content active"></div>

  <!-- ═══════════ INDIVIDUAL TAB ═══════════ -->
  <div id="tab-individual" class="tab-content"></div>

  <!-- ═══════════ PERIOD SUMMARY TAB ═══════════ -->
  <div id="tab-period" class="tab-content"></div>

  <div class="footer">Infosoft Consulting Corporation · Mindanao BU-2 · KSAT Evaluation Report</div>
</div>

<script>
// ── DATA ──
const EMP = {
  chinley: { name:"Chinley Jane Pagobo", short:"Chinley", knowledge:[7.0,6.75,8.0,8.75,8.75], skills:[7.0,7.25,8.25,8.75,8.75], attitude:[8.33,7.33,8.67,9.17,9.0], team:[9.0,8.5,8.75,9.8,9.4] },
  jeffrey: { name:"Jeffrey Anicoy", short:"Jeffrey", knowledge:[7.25,7.0,7.5,8.75,9.0], skills:[7.5,8.25,7.25,8.5,8.25], attitude:[8.33,7.83,8.0,8.67,9.5], team:[7.0,8.25,9.0,9.8,10.0] },
  maria: { name:"Maria Shel Santillan", short:"Maria", knowledge:[8.0,5.0,8.75,8.75,9.5], skills:[8.0,6.5,8.25,9.0,9.75], attitude:[8.83,5.83,8.5,8.83,9.83], team:[9.25,8.75,9.5,9.6,9.8] },
  duke: { name:"Duke Ian Pastor", short:"Duke", knowledge:[7.25,7.0,8.25,8.25,8.0], skills:[8.0,6.75,8.5,8.5,8.0], attitude:[8.33,7.5,8.5,8.5,7.67], team:[8.25,6.5,8.25,8.4,7.2] },
};
const PERIODS = ["JUL 2024","SEP 2024","NOV 2024","JAN 2025","MAR 2026"];
const CATS = ["knowledge","skills","attitude","team"];
const CAT_LABELS = {knowledge:"Knowledge",skills:"Skills",attitude:"Attitude",team:"Team / Company"};
const CAT_ICONS = {knowledge:"📘",skills:"⚡",attitude:"💡",team:"🤝"};
const EMP_COLORS = {chinley:"#5b9cf6",jeffrey:"#9b7cf6",maria:"#f472b6",duke:"#f5b946"};
const CAT_COLORS = {knowledge:"#5b9cf6",skills:"#9b7cf6",attitude:"#f5b946",team:"#34d399"};
const empKeys = Object.keys(EMP);

function avg(e,i){ return CATS.reduce((s,c)=>s+e[c][i],0)/4; }
function groupAvgCat(c,i){ return empKeys.reduce((s,k)=>s+EMP[k][c][i],0)/4; }
function groupAvgAll(i){ return CATS.reduce((s,c)=>s+groupAvgCat(c,i),0)/4; }
function sc(v){ return v>=9?"#34d399":v>=8?"#5eead4":v>=7?"#f5b946":v>=6?"#fb923c":"#f0736e"; }
function sbg(v){ return v>=9?"rgba(52,211,153,0.15)":v>=8?"rgba(94,234,212,0.12)":v>=7?"rgba(245,185,70,0.12)":v>=6?"rgba(251,146,60,0.12)":"rgba(240,115,110,0.12)"; }
function sl(v){ return v>=9?"Excellent":v>=8?"Very Good":v>=7?"Good":v>=6?"Satisfactory":"Needs Improvement"; }
function badge(v){ return `<span class="score-badge" style="background:${sbg(v)};color:${sc(v)}">${v.toFixed(2)}</span>`; }
function pill(v){ return `<span class="rating-pill" style="background:${sbg(v)};color:${sc(v)}">${sl(v)}</span>`; }
function changeHtml(d){ const cls=d>=0?"up":"down"; const arr=d>=0?"↑":"↓"; return `<span class="kpi-change ${cls}">${arr} ${Math.abs(d).toFixed(2)}</span>`; }

let charts = {};
let selectedEmp = "chinley";

// ── TAB SWITCHING ──
function switchTab(t) {
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(el=>{ if(el.textContent.toLowerCase().includes(t==='period'?'period':t)) el.classList.add('active'); });
  if(t==='group') renderGroup();
  if(t==='individual') renderIndividual();
  if(t==='period') renderPeriod();
}

// ── CHART HELPERS ──
function destroyChart(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }
function chartDefaults(){
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color:'#8a9bb5', font:{family:'Plus Jakarta Sans',size:11,weight:'600'}, boxWidth:12, padding:14 } } },
    scales: {
      x: { ticks:{color:'#5a6d85',font:{family:'Plus Jakarta Sans',size:10}}, grid:{color:'rgba(255,255,255,0.04)'}, border:{color:'rgba(255,255,255,0.06)'} },
      y: { min:4, max:10, ticks:{color:'#5a6d85',font:{family:'Plus Jakarta Sans',size:10},stepSize:1}, grid:{color:'rgba(255,255,255,0.04)'}, border:{color:'rgba(255,255,255,0.06)'} }
    }
  };
}
function radarDefaults(){
  return {
    responsive: true, maintainAspectRatio: false,
    scales: { r: { min:0, max:10, ticks:{color:'#5a6d85',backdropColor:'transparent',font:{size:9},stepSize:2}, grid:{color:'rgba(255,255,255,0.06)'}, angleLines:{color:'rgba(255,255,255,0.06)'}, pointLabels:{color:'#8a9bb5',font:{family:'Plus Jakarta Sans',size:11,weight:'600'}} } },
    plugins: { legend: { labels: { color:'#8a9bb5', font:{family:'Plus Jakarta Sans',size:11,weight:'600'}, boxWidth:12, padding:14 } } }
  };
}

// ══════════════════════════════════════
// GROUP TAB
// ══════════════════════════════════════
function renderGroup(){
  const container = document.getElementById('tab-group');
  // KPIs
  let kpiHtml = '<div class="grid-4">';
  empKeys.forEach(k=>{
    const e=EMP[k], lat=avg(e,4), fst=avg(e,0), ch=lat-fst;
    kpiHtml += `<div class="card kpi" style="border-left:4px solid ${EMP_COLORS[k]};--accent-color:${EMP_COLORS[k]}">
      <div class="kpi-label" style="color:${EMP_COLORS[k]}">${e.name}</div>
      <div class="kpi-value" style="color:${sc(lat)}">${lat.toFixed(2)}</div>
      <div>${changeHtml(ch)}<span class="kpi-sub">growth</span> ${pill(lat)}</div>
    </div>`;
  });
  kpiHtml += '</div>';

  // Charts
  let chartsHtml = `<div class="grid-2">
    <div class="card"><div class="section-title">Overall Score Trends — All Employees</div><div style="height:280px"><canvas id="groupTrend"></canvas></div></div>
    <div class="card"><div class="section-title">Latest Competency Comparison</div><div style="height:280px"><canvas id="groupRadar"></canvas></div></div>
  </div>`;

  // Bar chart
  chartsHtml += `<div class="card mb-22"><div class="section-title">Latest Scores by Category</div><div style="height:280px"><canvas id="groupBar"></canvas></div></div>`;

  // Table
  let tableHtml = `<div class="card"><div class="section-title">Latest Period Comparison · MAR 2026</div><div style="overflow-x:auto"><table><thead><tr><th>Employee</th>`;
  CATS.forEach(c=>{ tableHtml += `<th style="color:${CAT_COLORS[c]}">${CAT_LABELS[c]}</th>`; });
  tableHtml += `<th>Overall</th><th>Rating</th></tr></thead><tbody>`;
  empKeys.forEach(k=>{
    const e=EMP[k], ov=avg(e,4);
    tableHtml += `<tr><td style="color:${EMP_COLORS[k]}">${e.name}</td>`;
    CATS.forEach(c=>{ tableHtml += `<td>${badge(e[c][4])}</td>`; });
    tableHtml += `<td><span style="font-weight:800;font-size:14px;color:${sc(ov)}">${ov.toFixed(2)}</span></td><td>${pill(ov)}</td></tr>`;
  });
  // Group avg row
  tableHtml += `<tr class="row-total"><td>🏆 GROUP AVERAGE</td>`;
  CATS.forEach(c=>{ const a=groupAvgCat(c,4); tableHtml += `<td><span style="font-weight:800;color:${sc(a)}">${a.toFixed(2)}</span></td>`; });
  const ga = groupAvgAll(4);
  tableHtml += `<td><span style="font-weight:800;font-size:15px;color:${sc(ga)}">${ga.toFixed(2)}</span></td><td>${pill(ga)}</td></tr>`;
  tableHtml += `</tbody></table></div></div>`;

  // Legend
  let legendHtml = `<div class="legend-bar">`;
  [["#34d399","9–10 Excellent"],["#5eead4","8 Very Good"],["#f5b946","7 Good"],["#fb923c","6 Satisfactory"],["#f0736e","<6 Needs Improvement"]].forEach(([c,l])=>{
    legendHtml += `<div class="legend-item"><div class="legend-swatch" style="background:${c}"></div><span class="legend-label">${l}</span></div>`;
  });
  legendHtml += '</div>';

  container.innerHTML = kpiHtml + chartsHtml + tableHtml + legendHtml;

  // Draw charts
  setTimeout(()=>{
    destroyChart('groupTrend');
    const datasets = empKeys.map(k=>({
      label:EMP[k].short, data:PERIODS.map((_,i)=>avg(EMP[k],i)),
      borderColor:EMP_COLORS[k], backgroundColor:EMP_COLORS[k]+'20',
      borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#fff', pointBorderColor:EMP_COLORS[k], pointBorderWidth:2, tension:0.3
    }));
    datasets.push({ label:'Group Avg', data:PERIODS.map((_,i)=>groupAvgAll(i)), borderColor:'#8a9bb5', borderDash:[6,4], borderWidth:2, pointRadius:3, pointBackgroundColor:'#132238', pointBorderColor:'#8a9bb5', tension:0.3 });
    charts.groupTrend = new Chart(document.getElementById('groupTrend'),{ type:'line', data:{labels:PERIODS,datasets}, options:{...chartDefaults(),scales:{...chartDefaults().scales,y:{...chartDefaults().scales.y,min:5}}} });

    destroyChart('groupRadar');
    charts.groupRadar = new Chart(document.getElementById('groupRadar'),{
      type:'radar',
      data:{ labels:CATS.map(c=>CAT_LABELS[c]), datasets:empKeys.map(k=>({ label:EMP[k].short, data:CATS.map(c=>EMP[k][c][4]), borderColor:EMP_COLORS[k], backgroundColor:EMP_COLORS[k]+'15', borderWidth:2, pointRadius:3, pointBackgroundColor:EMP_COLORS[k] })) },
      options: radarDefaults()
    });

    destroyChart('groupBar');
    charts.groupBar = new Chart(document.getElementById('groupBar'),{
      type:'bar',
      data:{ labels:CATS.map(c=>CAT_LABELS[c]), datasets:empKeys.map(k=>({ label:EMP[k].short, data:CATS.map(c=>EMP[k][c][4]), backgroundColor:EMP_COLORS[k]+'cc', borderColor:EMP_COLORS[k], borderWidth:1, borderRadius:6 })) },
      options:{...chartDefaults(),scales:{...chartDefaults().scales,y:{...chartDefaults().scales.y,min:5}}}
    });
  }, 50);
}

// ══════════════════════════════════════
// INDIVIDUAL TAB
// ══════════════════════════════════════
function selectEmp(k){
  selectedEmp = k;
  renderIndividual();
}
function renderIndividual(){
  const container = document.getElementById('tab-individual');
  const e = EMP[selectedEmp];
  const latO = avg(e,4), fstO = avg(e,0), gr = latO-fstO;

  // Selector
  let selHtml = '<div class="emp-selector">';
  empKeys.forEach(k=>{
    const active = k===selectedEmp;
    selHtml += `<button class="emp-btn${active?' active':''}" style="${active?`border-color:${EMP_COLORS[k]};color:${EMP_COLORS[k]};background:${EMP_COLORS[k]}12;box-shadow:0 2px 12px ${EMP_COLORS[k]}20`:''}" onclick="selectEmp('${k}')">${EMP[k].short}</button>`;
  });
  selHtml += '</div>';

  // KPIs
  let kpiHtml = '<div class="grid-4" style="grid-template-columns:repeat(auto-fit,minmax(155px,1fr))">';
  CATS.forEach(c=>{
    const lat=e[c][4], ch=lat-e[c][0];
    kpiHtml += `<div class="card kpi" style="--accent-color:${CAT_COLORS[c]}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span class="kpi-icon">${CAT_ICONS[c]}</span><span class="kpi-label">${CAT_LABELS[c]}</span></div>
      <div class="kpi-value" style="color:${sc(lat)}">${lat.toFixed(2)}</div>
      <div>${changeHtml(ch)}<span class="kpi-sub">from baseline</span></div>
    </div>`;
  });
  kpiHtml += `<div class="card kpi" style="background:linear-gradient(135deg,rgba(52,211,153,0.08),rgba(245,185,70,0.06));border-color:rgba(52,211,153,0.2);--accent-color:var(--emerald)">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span class="kpi-icon">🏆</span><span class="kpi-label" style="color:var(--emerald)">Overall</span></div>
    <div class="kpi-value" style="color:${sc(latO)}">${latO.toFixed(2)}</div>
    <div>${changeHtml(gr)} ${pill(latO)}</div>
  </div></div>`;

  // Charts
  let chartsHtml = `<div class="grid-2">
    <div class="card"><div class="section-title">Category Trend Over Time</div><div style="height:260px"><canvas id="indTrend"></canvas></div></div>
    <div class="card"><div class="section-title">Competency Profile · First vs Latest</div><div style="height:260px"><canvas id="indRadar"></canvas></div></div>
  </div>`;

  // Table
  let tableHtml = `<div class="card"><div class="section-title">${e.name} — Score Matrix</div><div style="overflow-x:auto"><table><thead><tr><th>Category</th>`;
  PERIODS.forEach(p=>{ tableHtml += `<th>${p}</th>`; });
  tableHtml += `<th>Change</th></tr></thead><tbody>`;
  CATS.forEach(c=>{
    const d = e[c][4]-e[c][0];
    tableHtml += `<tr><td style="color:${CAT_COLORS[c]}">${CAT_ICONS[c]} ${CAT_LABELS[c]}</td>`;
    e[c].forEach(v=>{ tableHtml += `<td>${badge(v)}</td>`; });
    tableHtml += `<td><span style="font-weight:800;color:${d>=0?'var(--emerald)':'var(--coral)'}">${d>=0?'+':''}${d.toFixed(2)}</span></td></tr>`;
  });
  tableHtml += `<tr class="row-total"><td>🏆 OVERALL</td>`;
  PERIODS.forEach((_,i)=>{ const v=avg(e,i); tableHtml += `<td><span style="font-weight:800;font-size:13px;color:${sc(v)}">${v.toFixed(2)}</span></td>`; });
  tableHtml += `<td><span style="font-weight:800;font-size:13px;color:${gr>=0?'var(--emerald)':'var(--coral)'}">${gr>=0?'+':''}${gr.toFixed(2)}</span></td></tr>`;
  tableHtml += `</tbody></table></div></div>`;

  container.innerHTML = selHtml + kpiHtml + chartsHtml + tableHtml;

  setTimeout(()=>{
    destroyChart('indTrend');
    const ds = CATS.map(c=>({
      label:CAT_LABELS[c], data:e[c], borderColor:CAT_COLORS[c], backgroundColor:CAT_COLORS[c]+'20',
      borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#fff', pointBorderColor:CAT_COLORS[c], pointBorderWidth:2, tension:0.3
    }));
    ds.push({ label:'Overall', data:PERIODS.map((_,i)=>avg(e,i)), borderColor:'#8a9bb5', borderDash:[6,4], borderWidth:2, pointRadius:3, pointBackgroundColor:'#132238', pointBorderColor:'#8a9bb5', tension:0.3 });
    charts.indTrend = new Chart(document.getElementById('indTrend'),{ type:'line', data:{labels:PERIODS,datasets:ds}, options:chartDefaults() });

    destroyChart('indRadar');
    charts.indRadar = new Chart(document.getElementById('indRadar'),{
      type:'radar',
      data:{ labels:CATS.map(c=>CAT_LABELS[c]), datasets:[
        { label:'MAR 2026', data:CATS.map(c=>e[c][4]), borderColor:EMP_COLORS[selectedEmp], backgroundColor:EMP_COLORS[selectedEmp]+'25', borderWidth:2.5, pointRadius:4, pointBackgroundColor:EMP_COLORS[selectedEmp] },
        { label:'JUL 2024', data:CATS.map(c=>e[c][0]), borderColor:'#5a6d85', backgroundColor:'rgba(90,109,133,0.08)', borderWidth:1.5, borderDash:[4,3], pointRadius:3, pointBackgroundColor:'#5a6d85' }
      ]}, options: radarDefaults()
    });
  }, 50);
}

// ══════════════════════════════════════
// PERIOD SUMMARY TAB
// ══════════════════════════════════════
function renderPeriod(){
  const container = document.getElementById('tab-period');

  // Period overview cards
  let cardsHtml = '<div class="section-title" style="margin-bottom:14px">Group Average per Evaluation Period</div><div class="grid-5">';
  PERIODS.forEach((p,i)=>{
    const ga = groupAvgAll(i);
    const prevGa = i>0 ? groupAvgAll(i-1) : null;
    const ch = prevGa !== null ? ga - prevGa : null;
    cardsHtml += `<div class="period-card">
      <div class="period-name">${p}</div>
      <div class="period-avg" style="color:${sc(ga)}">${ga.toFixed(2)}</div>
      <div>${pill(ga)}</div>
      ${ch!==null ? `<div style="margin-top:6px">${changeHtml(ch)}<span class="kpi-sub">vs prev</span></div>` : '<div style="margin-top:6px;font-size:10px;color:var(--text-muted)">Baseline</div>'}
      <div class="period-breakdown">
        ${CATS.map(c=>`<div class="period-cat"><span style="color:${CAT_COLORS[c]}">${CAT_LABELS[c].split('/')[0].trim()}</span><span style="color:${sc(groupAvgCat(c,i))}">${groupAvgCat(c,i).toFixed(1)}</span></div>`).join('')}
      </div>
    </div>`;
  });
  cardsHtml += '</div>';

  // Group avg trend chart
  let chartsHtml = `<div class="grid-2">
    <div class="card"><div class="section-title">Group Average Trend by Category</div><div style="height:280px"><canvas id="periodCatTrend"></canvas></div></div>
    <div class="card"><div class="section-title">Group Overall Trend</div><div style="height:280px"><canvas id="periodOverallTrend"></canvas></div></div>
  </div>`;

  // Detailed table per period
  let tableHtml = `<div class="card mb-22"><div class="section-title">Detailed Summary — All Periods × All Employees</div><div style="overflow-x:auto"><table><thead><tr><th>Period</th><th>Employee</th>`;
  CATS.forEach(c=>{ tableHtml += `<th style="color:${CAT_COLORS[c]}">${CAT_LABELS[c]}</th>`; });
  tableHtml += `<th>Overall</th></tr></thead><tbody>`;

  PERIODS.forEach((p,i)=>{
    empKeys.forEach((k,j)=>{
      const e = EMP[k], ov = avg(e,i);
      tableHtml += `<tr${j===0?' style="border-top:2px solid rgba(255,255,255,0.06)"':''}><td style="color:var(--text-secondary);font-weight:600">${j===0?p:''}</td><td style="color:${EMP_COLORS[k]};font-weight:700">${e.short}</td>`;
      CATS.forEach(c=>{ tableHtml += `<td>${badge(e[c][i])}</td>`; });
      tableHtml += `<td><span style="font-weight:800;color:${sc(ov)}">${ov.toFixed(2)}</span></td></tr>`;
    });
    // Period group avg
    const pga = groupAvgAll(i);
    tableHtml += `<tr class="row-total"><td></td><td>📊 GROUP AVG</td>`;
    CATS.forEach(c=>{ const a=groupAvgCat(c,i); tableHtml += `<td><span style="font-weight:800;color:${sc(a)}">${a.toFixed(2)}</span></td>`; });
    tableHtml += `<td><span style="font-weight:800;font-size:13px;color:${sc(pga)}">${pga.toFixed(2)}</span></td></tr>`;
  });
  tableHtml += `</tbody></table></div></div>`;

  // Growth summary
  let growthHtml = `<div class="card"><div class="section-title">Growth Summary — Baseline (JUL 2024) to Latest (MAR 2026)</div><div style="overflow-x:auto"><table><thead><tr><th>Employee</th>`;
  CATS.forEach(c=>{ growthHtml += `<th style="color:${CAT_COLORS[c]}">${CAT_LABELS[c]}</th>`; });
  growthHtml += `<th>Overall</th></tr></thead><tbody>`;
  empKeys.forEach(k=>{
    const e = EMP[k];
    growthHtml += `<tr><td style="color:${EMP_COLORS[k]};font-weight:700">${e.name}</td>`;
    CATS.forEach(c=>{
      const d = e[c][4]-e[c][0];
      growthHtml += `<td><span style="font-weight:800;color:${d>=0?'var(--emerald)':'var(--coral)'}">${d>=0?'+':''}${d.toFixed(2)}</span></td>`;
    });
    const od = avg(e,4)-avg(e,0);
    growthHtml += `<td><span style="font-weight:800;font-size:13px;color:${od>=0?'var(--emerald)':'var(--coral)'}">${od>=0?'+':''}${od.toFixed(2)}</span></td></tr>`;
  });
  // Group growth
  const gg = groupAvgAll(4)-groupAvgAll(0);
  growthHtml += `<tr class="row-total"><td>🏆 GROUP</td>`;
  CATS.forEach(c=>{ const d=groupAvgCat(c,4)-groupAvgCat(c,0); growthHtml += `<td><span style="font-weight:800;color:${d>=0?'var(--emerald)':'var(--coral)'}">${d>=0?'+':''}${d.toFixed(2)}</span></td>`; });
  growthHtml += `<td><span style="font-weight:800;font-size:14px;color:${gg>=0?'var(--emerald)':'var(--coral)'}">${gg>=0?'+':''}${gg.toFixed(2)}</span></td></tr>`;
  growthHtml += `</tbody></table></div></div>`;

  container.innerHTML = cardsHtml + chartsHtml + tableHtml + growthHtml;

  setTimeout(()=>{
    destroyChart('periodCatTrend');
    charts.periodCatTrend = new Chart(document.getElementById('periodCatTrend'),{
      type:'line',
      data:{ labels:PERIODS, datasets:CATS.map(c=>({
        label:CAT_LABELS[c], data:PERIODS.map((_,i)=>groupAvgCat(c,i)),
        borderColor:CAT_COLORS[c], backgroundColor:CAT_COLORS[c]+'20',
        borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#fff', pointBorderColor:CAT_COLORS[c], pointBorderWidth:2, tension:0.3, fill:true
      })) },
      options:{...chartDefaults(),scales:{...chartDefaults().scales,y:{...chartDefaults().scales.y,min:5}}}
    });

    destroyChart('periodOverallTrend');
    const overallData = PERIODS.map((_,i)=>groupAvgAll(i));
    charts.periodOverallTrend = new Chart(document.getElementById('periodOverallTrend'),{
      type:'bar',
      data:{ labels:PERIODS, datasets:[{
        label:'Group Overall Average',
        data:overallData,
        backgroundColor: overallData.map(v=>sc(v)+'99'),
        borderColor: overallData.map(v=>sc(v)),
        borderWidth:2, borderRadius:8
      }] },
      options:{...chartDefaults(),scales:{...chartDefaults().scales,y:{...chartDefaults().scales.y,min:5}},plugins:{...chartDefaults().plugins,legend:{display:false}}}
    });
  }, 50);
}

// Init
renderGroup();
</script>
</body>
</html>
